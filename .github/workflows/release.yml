name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release-please
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        with:
          ref: ${{ fromJSON(steps.release-please.outputs.pr || '{}').headBranchName || '' }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2.0.5
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        with:
          deno-version: v2.x

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        with:
          standalone: true

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        with:
          node-version: '24'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}

      - run: pnpm run lint
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}

      - run: pnpm run fmt --check
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}

      - run: pnpm test
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}

      - run: pnpm run build
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}

      - name: Commit dist updates
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        env:
          RELEASE_PR_BRANCH: ${{ fromJSON(steps.release-please.outputs.pr || '{}').headBranchName || '' }}
        run: |
          git add dist

          if git diff --cached --quiet -- dist; then
            echo "dist is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore: update dist"
          git push origin "HEAD:${RELEASE_PR_BRANCH}"

      - name: Sync v2 tag
        if: ${{ steps.release-please.outputs.release_created == 'true' && steps.release-please.outputs.major == '2' }}
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          RELEASE_SHA: ${{ steps.release-please.outputs.sha }}
        with:
          script: |
            const ref = 'tags/v2'
            const sha = process.env.RELEASE_SHA

            try {
              await github.rest.git.updateRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref,
                sha,
                force: true
              })
            } catch (error) {
              const refDoesNotExist = error.status === 404 ||
                (error.status === 422 && /does not exist/i.test(String(error.message)))

              if (!refDoesNotExist) {
                throw error
              }

              await github.rest.git.createRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `refs/${ref}`,
                sha
              })
            }

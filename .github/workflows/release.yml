name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v5
        id: release-please
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

      - uses: actions/checkout@v7
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        with:
          ref: ${{ fromJSON(steps.release-please.outputs.pr).headBranchName }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: denoland/setup-deno@v2
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        with:
          deno-version: v2.x

      - uses: actions/setup-node@v6
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        with:
          node-version: '24'
          cache: 'npm'

      - run: npm ci
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}

      - run: npm run lint
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}

      - run: npm run fmt -- --check
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}

      - run: npm test
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}

      - run: npm run build
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}

      - name: Commit dist updates
        if: ${{ steps.release-please.outputs.prs_created == 'true' }}
        env:
          RELEASE_PR_BRANCH: ${{ fromJSON(steps.release-please.outputs.pr).headBranchName }}
        run: |
          if git diff --quiet -- dist; then
            echo "dist is already current."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add dist
          git commit -m "chore: update dist"
          git push origin "HEAD:${RELEASE_PR_BRANCH}"

      - name: Update v2 tag
        id: update-major-tag
        if: ${{ steps.release-please.outputs.release_created == 'true' && steps.release-please.outputs.major == '2' }}
        uses: octokit/request-action@v3
        continue-on-error: true
        with:
          route: PATCH /repos/${{ github.repository }}/git/refs/tags/v2
          sha: ${{ steps.release-please.outputs.sha }}
          force: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create v2 tag
        if: ${{ steps.release-please.outputs.release_created == 'true' && steps.release-please.outputs.major == '2' && steps.update-major-tag.outcome == 'failure' }}
        uses: octokit/request-action@v3
        with:
          route: POST /repos/${{ github.repository }}/git/refs
          ref: refs/tags/v2
          sha: ${{ steps.release-please.outputs.sha }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

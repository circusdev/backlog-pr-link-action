name: 'Backlog Pull Request Link Action'
description: 'Link the Pull Request to Backlog issue.'
author: 'toshimaru'
inputs:
  backlog-api-key:
    description: 'API key for Backlog'
    required: true
  backlog-host:
    description: 'Backlog hostname (e.g. your-org.backlog.com")'
    required: true
  pr-link-template:
    description: 'Template used for the Pull Request custom field value. Supports {prTitle}, {rawPrTitle}, and {link}.'
    required: false
    default: '[{prTitle}]({link})'
runs:
  using: 'node24'
  main: 'dist/index.js'
branding:
  icon: 'link-2'
  color: 'green'
